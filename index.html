<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockle</title>
<style>
:root {
  --bg: #f9f6f0;
  --card: #ffffff;
  --border: #e2ddd4;
  --text: #1a1a1a;
  --green: #2a7a2a;
  --green-bg: #eaf4ea;
  --red: #c0392b;
  --red-bg: #fdecea;
  --amber-bg: #fff8e1;
  --amber: #7a5c00;
  --muted: #888;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Screens ── */
.screen { display: none; width: 100%; max-width: 580px; padding: 20px; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── Logo ── */
.logo { font-size: 1.9rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.logo .s { color: #1a1a1a; }
.logo .le { color: var(--green); }

/* ══════════════════════════════════════════
   MARKET SELECTION SCREEN
══════════════════════════════════════════ */
#screen-market {
  align-items: center;
  justify-content: center;
  gap: 36px;
}

.market-subtitle {
  color: var(--muted);
  font-size: 0.9rem;
  text-align: center;
  max-width: 320px;
  line-height: 1.5;
}

.market-cards {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.market-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 22px 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
  min-width: 130px;
  user-select: none;
}

.market-card:hover:not(.disabled) {
  border-color: var(--green);
  transform: translateY(-3px);
  box-shadow: 0 6px 18px rgba(42,122,42,0.13);
}

.market-card:active:not(.disabled) { transform: translateY(-1px); }

.market-card.disabled { opacity: 0.45; cursor: not-allowed; }

.market-card .mc-flag { font-size: 2.2rem; margin-bottom: 8px; }
.market-card .mc-name { font-weight: 700; font-size: 1rem; }
.market-card .mc-soon {
  margin-top: 6px;
  font-size: 0.65rem;
  background: #e8e8e8;
  color: #777;
  padding: 2px 8px;
  border-radius: 100px;
  display: inline-block;
}

/* ══════════════════════════════════════════
   GAME SCREEN
══════════════════════════════════════════ */
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
  gap: 8px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.mkt-badge {
  font-size: 0.72rem;
  font-weight: 700;
  background: var(--green-bg);
  color: var(--green);
  padding: 4px 10px;
  border-radius: 100px;
}

.countdown {
  font-size: 0.7rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.btn-sm {
  background: none;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 0.75rem;
  color: var(--text);
  white-space: nowrap;
  transition: border-color 0.15s;
}
.btn-sm:hover { border-color: #aaa; }

/* ── Attempts list ── */
#attempts-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

/* Each attempt card */
.attempt-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  animation: fadeSlideDown 0.28s ease;
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.attempt-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 0.2px;
}

/* 2×3 grid: 3 cols, 2 rows */
.attempt-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.cell {
  border-radius: 7px;
  padding: 7px 5px 6px;
  text-align: center;
}

.cell-lbl {
  font-size: 0.58rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  opacity: 0.55;
  margin-bottom: 3px;
}

.cell-val {
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.2;
  word-break: break-word;
}

.cell-arr {
  font-size: 0.85rem;
  font-weight: 800;
  margin-top: 2px;
  line-height: 1;
}

.cell-ok   { background: var(--green-bg); color: var(--green); }
.cell-no   { background: var(--red-bg);   color: var(--red); }
.cell-num  { background: var(--amber-bg); color: var(--amber); }

/* ── Input area ── */
.input-wrap {
  position: relative;
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

#guess-input {
  flex: 1;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.95rem;
  background: var(--card);
  outline: none;
  transition: border-color 0.18s;
}
#guess-input:focus { border-color: var(--green); }
#guess-input.error { border-color: var(--red); }

#btn-guess {
  padding: 0 20px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.18s;
  min-width: 48px;
}
#btn-guess:hover { opacity: 0.85; }
#btn-guess:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Autocomplete ── */
#autocomplete-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 56px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  z-index: 200;
  max-height: 220px;
  overflow-y: auto;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  display: none;
}

.ac-item {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 0.88rem;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #f0ede8;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--bg); }
.ac-ticker { font-weight: 800; color: var(--green); min-width: 52px; }
.ac-name { color: var(--muted); }

/* ── Status bar ── */
.game-status {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  padding: 6px 0 4px;
}

/* ── Result banner ── */
#result-banner {
  display: none;
  background: var(--card);
  border: 2px solid var(--green);
  border-radius: 12px;
  padding: 18px;
  text-align: center;
  margin-bottom: 14px;
}
#result-banner.lose { border-color: var(--red); }
#result-banner .rb-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
#result-banner .rb-sub { font-size: 0.85rem; color: var(--muted); }

/* ══════════════════════════════════════════
   STATS SCREEN
══════════════════════════════════════════ */
#screen-stats {
  gap: 20px;
  padding-top: 32px;
}

.stats-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 8px;
  text-align: center;
}
.stat-box .sb-num { font-size: 1.8rem; font-weight: 800; color: var(--green); }
.stat-box .sb-lbl { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
</style>
</head>

</div>

<!-- ═══════════════════════ GAME ═══════════════════════ -->
<div id="screen-game" class="screen">

    </div>
  </div>

  <div class="input-wrap" id="input-wrap">
    <input type="text" id="guess-input" placeholder="Ticker or company name…" autocomplete="off" spellcheck="false">
    <div id="autocomplete-list"></div>
    <button id="btn-guess" onclick="submitGuess()">→</button>
  </div>

  <div id="result-banner">

    <div class="rb-sub"  id="rb-sub"></div>
  </div>

  <div id="attempts-list"></div>
</div>

<!-- ═══════════════════════ STATS ═══════════════════════ -->
<div id="screen-stats" class="screen">

  </div>

    <div class="stat-box"><div class="sb-num" id="s-pct">0%</div><div class="sb-lbl">% Won</div></div>

    <div class="stat-box"><div class="sb-num" id="s-best">—</div><div class="sb-lbl">Best</div></div>
  </div>
</div>

    {ticker:"INTC",  name:"Intel",             market:"NASDAQ",  sector:"Technology",               ipo:1971,mktCap:85,   revenue:54.2, ytd:-40.2},
    {ticker:"UBER",  name:"Uber",              market:"NYSE",    sector:"Consumer Discretionary",   ipo:2019,mktCap:160,  revenue:43.9, ytd:-12.3},
    {ticker:"PYPL",  name:"PayPal",            market:"NASDAQ",  sector:"Financials",               ipo:2002,mktCap:73,   revenue:31.8, ytd:5.4}
  ]

// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
let currentMarket = null;
let stocks        = [];
let target        = null;
let attempts      = [];   // newest first
let gameOver      = false;
const MAX_ATT     = 8;

// ════════════════════════════════════════════════════
//  INIT / MARKET SELECT
// ════════════════════════════════════════════════════
async function selectMarket(market) {
  currentMarket = market;

  // Try fresh JSON, fall back to embedded data
  // Supports both array format and {updated_at, stocks:[]} format from pipeline
  try {
    const r = await fetch(`data/${market}.json`);
    if (r.ok) {
      const d = await r.json();
      stocks = Array.isArray(d) ? d : (d.stocks || FALLBACK[market]);
    } else {
      stocks = FALLBACK[market];
    }
  } catch { stocks = FALLBACK[market]; }

  // Deterministic daily stock
  const today = new Date().toISOString().slice(0, 10);
  const seed  = [...(today + market)].reduce((a, c) => (a * 31 + c.charCodeAt(0)) | 0, 0);
  target = stocks[Math.abs(seed) % stocks.length];

  loadState();

  document.getElementById('mkt-badge').textContent =
    market === 'italy' ? 'FTSE MIB' : 'US Markets';

  // Reset UI state for the new market
  document.getElementById('result-banner').style.display = 'none';
  document.getElementById('guess-input').value = '';
  hideAC();

  showScreen('game');
  renderAll();
  startCountdown();
}

// ════════════════════════════════════════════════════
//  PERSIST
// ════════════════════════════════════════════════════
function stateKey() {
  return `stockle-${currentMarket}-${new Date().toISOString().slice(0,10)}`;
}

function saveState() {
  localStorage.setItem(stateKey(), JSON.stringify({ attempts, gameOver }));
}

function loadState() {
  const raw = localStorage.getItem(stateKey());
  if (raw) { const d = JSON.parse(raw); attempts = d.attempts || []; gameOver = d.gameOver || false; }
  else { attempts = []; gameOver = false; }
}

// ════════════════════════════════════════════════════
//  GAME LOGIC
// ════════════════════════════════════════════════════
function submitGuess() {
  if (gameOver) return;
  const inp = document.getElementById('guess-input');
  const q   = inp.value.trim().toUpperCase();
  const stock = stocks.find(s =>
    s.ticker.toUpperCase() === q ||
    s.name.toUpperCase()   === q.toUpperCase()
  );

  if (!stock) {
    inp.classList.add('error');
    setTimeout(() => inp.classList.remove('error'), 800);
    return;
  }

  // Prevent duplicate
  if (attempts.find(a => a.ticker === stock.ticker)) {
    inp.value = ''; hideAC(); return;
  }

  attempts.unshift(stock);   // newest at index 0
  inp.value = '';
  hideAC();

  const won = stock.ticker === target.ticker;
  if (won || attempts.length >= MAX_ATT) {
    gameOver = true;
    showResult(won);
    updateStats(won, attempts.length);
  }

  saveState();
  renderAll();
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
function renderAll() {
  renderAttempts();
  document.getElementById('att-num').textContent = attempts.length;
  document.getElementById('input-wrap').style.display = gameOver ? 'none' : 'flex';

  // Re-show result banner if this market's game is already over
  if (gameOver && attempts.length > 0) {
    const won = attempts[0].ticker === target.ticker;
    showResult(won);
  }
}

function renderAttempts() {
  const list = document.getElementById('attempts-list');
  list.innerHTML = '';

  attempts.forEach((g, i) => {
    const card = document.createElement('div');
    card.className = 'attempt-card';
    // Only animate the newest (top) card
    if (i > 0) card.style.animation = 'none';

    card.innerHTML = `
      <div class="attempt-label">${g.ticker} &middot; ${g.name}</div>
      <div class="attempt-grid">
        ${cell('Market',  g.market,  target.market,  'exact')}
        ${cell('Mkt Cap', g.mktCap,  target.mktCap,  'num',  'B')}
        ${cell('Sector',  g.sector,  target.sector,  'exact')}
        ${cell('IPO',     g.ipo,     target.ipo,     'num',  '')}
        ${cell('Revenue', g.revenue, target.revenue, 'num',  'B')}
        ${cell('YTD',     g.ytd,     target.ytd,     'num',  '%')}
      </div>`;
    list.appendChild(card);
  });
}

function cell(label, gv, tv, type, unit = '') {
  if (type === 'exact') {
    const ok  = gv === tv;
    const cls = ok ? 'cell-ok' : 'cell-no';
    const arr = ok ? '✓' : '✗';
    return `<div class="cell ${cls}">
      <div class="cell-lbl">${label}</div>
      <div class="cell-val">${trunc(gv)}</div>
      <div class="cell-arr">${arr}</div>
    </div>`;
  }

  // numeric
  const diff = gv - tv;
  const ok   = diff === 0;
  const cls  = ok ? 'cell-ok' : 'cell-num';
  const arr  = ok ? '✓' : (diff < 0 ? '↑' : '↓');

  let display = gv;
  if (unit === 'B')  display = gv >= 1000 ? `${(gv/1000).toFixed(1)}T` : `${gv}B`;
  if (unit === '%')  display = `${gv > 0 ? '+' : ''}${gv}%`;

  return `<div class="cell ${cls}">
    <div class="cell-lbl">${label}</div>
    <div class="cell-val">${display}</div>
    <div class="cell-arr">${arr}</div>
  </div>`;
}

function trunc(s) {
  s = String(s);
  return s.length > 11 ? s.slice(0, 10) + '…' : s;
}

// ════════════════════════════════════════════════════
//  RESULT BANNER
// ════════════════════════════════════════════════════
function showResult(won) {
  const b = document.getElementById('result-banner');
  b.style.display = 'block';
  b.className = won ? '' : 'lose';
  document.getElementById('rb-title').textContent =
    won ? `Got it in ${attempts.length} ${attempts.length === 1 ? 'attempt' : 'attempts'}!` : 'Game over';
  document.getElementById('rb-sub').textContent =
    `The stock was: ${target.ticker} · ${target.name}`;
}

// ════════════════════════════════════════════════════
//  STATS
// ════════════════════════════════════════════════════
function statsKey() { return `stockle-stats-${currentMarket}`; }

function updateStats(won, n) {
  const s = JSON.parse(localStorage.getItem(statsKey()) ||
    '{"played":0,"won":0,"streak":0,"best":99}');
  s.played++;
  if (won) { s.won++; s.streak++; if (n < s.best) s.best = n; }
  else s.streak = 0;
  localStorage.setItem(statsKey(), JSON.stringify(s));
}

function showStats() {
  const s = JSON.parse(localStorage.getItem(statsKey()) ||
    '{"played":0,"won":0,"streak":0,"best":99}');
  document.getElementById('s-played').textContent = s.played;
  document.getElementById('s-pct').textContent    = s.played ? Math.round(s.won / s.played * 100) + '%' : '0%';
  document.getElementById('s-streak').textContent = s.streak;
  document.getElementById('s-best').textContent   = s.best < 99 ? s.best : '—';
  showScreen('stats');
}

// ════════════════════════════════════════════════════
//  AUTOCOMPLETE
// ════════════════════════════════════════════════════
document.getElementById('guess-input').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  if (q.length < 1) { hideAC(); return; }
  const matches = stocks.filter(s =>
    s.ticker.toLowerCase().startsWith(q) ||
    s.name.toLowerCase().includes(q)
  ).slice(0, 7);
  if (!matches.length) { hideAC(); return; }
  const ul = document.getElementById('autocomplete-list');
  ul.innerHTML = '';
  ul.style.display = 'block';
  matches.forEach(s => {
    const d = document.createElement('div');
    d.className = 'ac-item';
    d.innerHTML = `<span class="ac-ticker">${s.ticker}</span><span class="ac-name">${s.name}</span>`;
    d.onclick = () => {
      document.getElementById('guess-input').value = s.ticker;
      hideAC();
      submitGuess();
    };
    ul.appendChild(d);
  });
});

document.getElementById('guess-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGuess();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.input-wrap')) hideAC();
});

function hideAC() {
  document.getElementById('autocomplete-list').style.display = 'none';
}

// ════════════════════════════════════════════════════
//  COUNTDOWN
// ════════════════════════════════════════════════════
function startCountdown() { tick(); setInterval(tick, 1000); }

function tick() {
  const now  = new Date();
  const next = new Date(now); next.setHours(24, 0, 0, 0);
  const d    = next - now;
  const h    = String(Math.floor(d / 3600000)).padStart(2, '0');
  const m    = String(Math.floor((d % 3600000) / 60000)).padStart(2, '0');
  const s    = String(Math.floor((d % 60000) / 1000)).padStart(2, '0');
  document.getElementById('countdown').textContent = `${h}:${m}:${s}`;
}

// ════════════════════════════════════════════════════
//  SCREEN NAVIGATION
// ════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}
</script>
